name: Generate GitHub Snake
on:
  schedule:
    - cron: "0 0 * * *"  # 每天凌晨自动更新
  workflow_dispatch:     # 允许手动触发
  push:                  # 推送到分支时触发
    branches: [main, master]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3  # 轻量SVG专属，比全量版快
        with:
          github_user_name: ${{ github.repository_owner }}  # 自动获取仓库所有者（你的用户名）
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark  # 深色模式版本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 自动注入，无需手动配置
      
      # 将生成的文件推送到output分支（自动创建）
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
